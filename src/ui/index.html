<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentbook Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1a1a2e;
      --panel: #16213e;
      --panel-2: #13203a;
      --panel-3: #0f3460;
      --text: #e0e0e0;
      --muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      --highlight: #e94560;
      --active: #3b82f6;
      --draft: #6b7280;
      --completed: #22c55e;
      --paused: #eab308;
      --cancelled: #ef4444;
      --pending: #9ca3af;
      --in-progress: #3b82f6;
      --blocked: #f97316;
      --radius: 8px;
      --max-width: 1180px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #19192b 0%, #121726 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      color: inherit;
      background: none;
      border: 0;
      cursor: pointer;
    }

    .page {
      width: min(100%, var(--max-width));
      margin: 0 auto;
      padding: 24px;
    }

    .hero,
    .panel,
    .project-card,
    .plan-card,
    .timeline-item,
    .empty,
    .error,
    .loading {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 22px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, rgba(15, 52, 96, 0.95), rgba(22, 33, 62, 0.95));
    }

    .hero-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0;
      font-size: 1.7rem;
    }

    .hero-icon {
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: rgba(233, 69, 96, 0.15);
      color: var(--highlight);
      font-size: 1.1rem;
    }

    .hero-subtitle,
    .muted,
    .project-path,
    .meta,
    .timeline-meta,
    .task-notes,
    .notes-empty {
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .subtle-button,
    .back-link,
    .expand-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
    }

    .subtle-button:hover,
    .back-link:hover,
    .expand-button:hover,
    .project-card:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .project-card {
      padding: 18px;
      transition: border-color 0.15s ease, transform 0.15s ease, background 0.15s ease;
    }

    .project-card:hover {
      transform: translateY(-2px);
      border-color: rgba(233, 69, 96, 0.35);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .row-between {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .project-name,
    .section-title,
    .plan-title,
    .detail-title {
      margin: 0;
      font-weight: 700;
    }

    .project-name {
      font-size: 1.05rem;
    }

    .project-path {
      margin-top: 8px;
      font-size: 0.92rem;
      word-break: break-all;
    }

    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      flex: none;
      background: var(--highlight);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06);
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      white-space: nowrap;
    }

    .badge.status-active,
    .badge.status-in_progress { background: rgba(59, 130, 246, 0.18); color: #bfdbfe; }
    .badge.status-draft,
    .badge.status-pending { background: rgba(107, 114, 128, 0.2); color: #d1d5db; }
    .badge.status-completed { background: rgba(34, 197, 94, 0.18); color: #bbf7d0; }
    .badge.status-paused { background: rgba(234, 179, 8, 0.18); color: #fde68a; }
    .badge.status-cancelled { background: rgba(239, 68, 68, 0.18); color: #fecaca; }
    .badge.status-blocked { background: rgba(249, 115, 22, 0.18); color: #fed7aa; }
    .badge.action { background: rgba(233, 69, 96, 0.16); color: #fda4af; }

    .label-empty {
      margin-top: 14px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .detail-header {
      display: grid;
      gap: 18px;
      margin-bottom: 24px;
    }

    .panel {
      padding: 18px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 1.1rem;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .plan-card {
      overflow: hidden;
    }

    .plan-summary {
      list-style: none;
      cursor: pointer;
      padding: 16px 18px;
      background: rgba(255, 255, 255, 0.02);
    }

    .plan-summary::-webkit-details-marker { display: none; }

    .plan-summary-indicator {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .plan-card[open] .plan-summary-indicator {
      color: var(--text);
    }

    .plan-body {
      border-top: 1px solid var(--border);
      padding: 16px 18px 18px;
      display: grid;
      gap: 16px;
    }

    .progress {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    .progress > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--highlight), #ff7a8b);
    }

    .description,
    .task-notes,
    .timeline-detail {
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .truncate-block[data-expanded="false"] .full-text,
    .truncate-block[data-expanded="true"] .short-text,
    .truncate-block[data-has-toggle="false"] .expand-button {
      display: none;
    }

    .task-table {
      display: grid;
      gap: 10px;
    }

    .task-row {
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) minmax(90px, 0.6fr) minmax(0, 1.3fr) minmax(90px, 0.6fr);
      gap: 12px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.04);
      align-items: start;
    }

    .task-title-line {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .task-icon {
      flex: none;
      width: 1.2rem;
      text-align: center;
    }

    .task-title {
      font-weight: 600;
    }

    .timeline {
      display: grid;
      gap: 12px;
    }

    .timeline-item {
      padding: 14px 16px;
    }

    .timeline-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .loading,
    .error,
    .empty {
      padding: 24px;
      text-align: center;
    }

    .error-title,
    .empty-title {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }

    .error-message,
    .empty-copy {
      margin: 0;
      color: var(--muted);
    }

    .pill-count {
      font-weight: 700;
    }

    @media (max-width: 860px) {
      .task-row {
        grid-template-columns: 1fr;
      }

      .hero {
        align-items: flex-start;
        flex-direction: column;
      }

      .section-header,
      .row-between {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 16px;
      }

      .hero-title {
        font-size: 1.4rem;
      }

      .project-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const app = document.getElementById('app');
    const refreshMs = 10000;
    let refreshHandle = null;
    let expandedText = new Set();

    const state = {
      route: parseRoute(),
      projects: [],
      detail: null,
      loading: false,
      error: ''
    };

    const TASK_ICONS = {
      pending: '⏳',
      in_progress: '🔄',
      completed: '✅',
      blocked: '🚫',
      cancelled: '❌'
    };

    function parseRoute() {
      const hash = window.location.hash || '#/';
      if (hash.startsWith('#/project/')) {
        const id = decodeURIComponent(hash.slice('#/project/'.length));
        return { name: 'project', id };
      }
      return { name: 'projects' };
    }

    function navigate(hash) {
      if (window.location.hash === hash) {
        state.route = parseRoute();
        loadRoute();
        return;
      }
      window.location.hash = hash;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function safeColor(value) {
      if (typeof value === 'string' && /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(value)) {
        return value;
      }
      return '#e94560';
    }

    function deriveProjectName(project) {
      const name = project?.name?.trim();
      if (name) return name;
      const worktree = project?.worktree || '';
      const parts = worktree.split('/').filter(Boolean);
      return parts[parts.length - 1] || 'Unnamed Project';
    }

    function formatRelative(value) {
      const timestamp = Number(value);
      if (!timestamp) return 'unknown';
      const diff = Date.now() - timestamp;
      const abs = Math.abs(diff);
      const units = [
        ['y', 365 * 24 * 60 * 60 * 1000],
        ['mo', 30 * 24 * 60 * 60 * 1000],
        ['d', 24 * 60 * 60 * 1000],
        ['h', 60 * 60 * 1000],
        ['m', 60 * 1000],
        ['s', 1000]
      ];
      for (const [label, size] of units) {
        if (abs >= size || label === 's') {
          const amount = Math.max(1, Math.floor(abs / size));
          return diff >= 0 ? `${amount}${label} ago` : `in ${amount}${label}`;
        }
      }
      return 'just now';
    }

    function pluralize(count, singular, plural = singular + 's') {
      return `${count} ${count === 1 ? singular : plural}`;
    }

    function truncateText(value, limit = 180) {
      const text = String(value ?? '').trim();
      if (!text) return { short: '', full: '', truncated: false };
      if (text.length <= limit) return { short: text, full: text, truncated: false };
      return { short: text.slice(0, limit).trimEnd() + '…', full: text, truncated: true };
    }

    function textBlock(key, text, limit, className = '') {
      const { short, full, truncated } = truncateText(text, limit);
      const expanded = expandedText.has(key);
      return `
        <div class="truncate-block ${className}" data-key="${escapeHtml(key)}" data-expanded="${expanded}" data-has-toggle="${truncated}">
          <div class="short-text">${escapeHtml(short)}</div>
          <div class="full-text">${escapeHtml(full)}</div>
          ${truncated ? `<button class="expand-button" data-action="toggle-expand" data-key="${escapeHtml(key)}">${expanded ? 'Show less' : 'Show more'}</button>` : ''}
        </div>
      `;
    }

    function humanizeStatus(status) {
      return String(status || '')
        .replace(/_/g, ' ')
        .replace(/\b\w/g, (char) => char.toUpperCase());
    }

    function statusBadge(status, label) {
      return `<span class="badge status-${escapeHtml(status)}">${escapeHtml(label || humanizeStatus(status))}</span>`;
    }

    function renderShell(content, subtitle = 'Live view of plans, tasks, and activity across your worktrees.') {
      return `
        <main class="page">
          <header class="hero">
            <div>
              <h1 class="hero-title"><span class="hero-icon">◈</span> Agentbook Dashboard</h1>
              <div class="hero-subtitle">${escapeHtml(subtitle)}</div>
            </div>
            <div class="toolbar">
              <button class="subtle-button" data-action="refresh">Refresh</button>
            </div>
          </header>
          ${content}
        </main>
      `;
    }

    function renderLoading(message = 'Loading dashboard…') {
      app.innerHTML = renderShell(`<section class="loading">${escapeHtml(message)}</section>`);
    }

    function renderError(message) {
      app.innerHTML = renderShell(`
        <section class="error">
          <h2 class="error-title">Could not load data</h2>
          <p class="error-message">${escapeHtml(message || 'Something went wrong.')}</p>
          <div style="margin-top: 16px;"><button class="subtle-button" data-action="refresh">Try again</button></div>
        </section>
      `);
    }

    function renderProjects() {
      const projects = [...(state.projects || [])].sort((a, b) => {
        if (Boolean(b.has_agentbook) !== Boolean(a.has_agentbook)) {
          return Number(Boolean(b.has_agentbook)) - Number(Boolean(a.has_agentbook));
        }
        return deriveProjectName(a).localeCompare(deriveProjectName(b), undefined, { sensitivity: 'base' });
      });

      const content = projects.length
        ? `<section class="project-grid">${projects.map(renderProjectCard).join('')}</section>`
        : `
          <section class="empty">
            <h2 class="empty-title">No projects found</h2>
            <p class="empty-copy">Once the API returns OpenCode projects, they will appear here automatically.</p>
          </section>
        `;

      app.innerHTML = renderShell(content, `${pluralize(projects.length, 'project')} discovered. Auto-refreshing every 10 seconds.`);
    }

    function renderProjectCard(project) {
      const name = deriveProjectName(project);
      const badges = project.has_agentbook
        ? `
          <div class="badge-row">
            <span class="badge"><span class="pill-count">${Number(project.active_plans || 0)}</span> active plans</span>
            <span class="badge"><span class="pill-count">${Number(project.active_tasks || 0)}</span> active tasks</span>
            <span class="badge"><span class="pill-count">${Number(project.pending_tasks || 0)}</span> pending</span>
            <span class="badge"><span class="pill-count">${Number(project.completed_tasks || 0)}</span> completed</span>
          </div>
        `
        : `<div class="label-empty">No plans yet</div>`;

      return `
        <article class="project-card" role="button" tabindex="0" data-action="open-project" data-project-id="${escapeHtml(project.id)}" aria-label="Open project ${escapeHtml(name)}">
          <div class="row-between">
            <div>
              <div class="row">
                <span class="color-dot" style="background:${safeColor(project.icon_color)}"></span>
                <h2 class="project-name">${escapeHtml(name)}</h2>
              </div>
              <div class="project-path">${escapeHtml(project.worktree || '')}</div>
            </div>
            ${project.has_agentbook ? '<span class="badge status-active">Agentbook</span>' : '<span class="badge status-draft">OpenCode</span>'}
          </div>
          ${badges}
        </article>
      `;
    }

    function renderDetail() {
      const detail = state.detail || {};
      const project = detail.project || {};
      const name = deriveProjectName(project);
      const plans = Array.isArray(detail.plans) ? detail.plans : [];
      const activity = Array.isArray(detail.activity) ? detail.activity.slice(0, 20) : [];

      const header = `
        <section class="detail-header">
          <div>
            <button class="back-link" data-action="back">← All Projects</button>
          </div>
          <div class="panel">
            <div class="row-between">
              <div>
                <div class="row">
                  <span class="color-dot" style="background:${safeColor(project.icon_color)}"></span>
                  <h2 class="detail-title">${escapeHtml(name)}</h2>
                </div>
                <div class="project-path">${escapeHtml(project.worktree || '')}</div>
              </div>
              <div class="badge-row">
                ${project.has_agentbook ? '<span class="badge status-active">Agentbook enabled</span>' : '<span class="badge status-draft">No agentbook data</span>'}
              </div>
            </div>
          </div>
        </section>
      `;

      const plansSection = `
        <section class="panel">
          <div class="section-header">
            <h3 class="section-title">Plans</h3>
            <div class="meta">${pluralize(plans.length, 'plan')}</div>
          </div>
          ${plans.length ? `<div class="stack">${plans.map(renderPlanCard).join('')}</div>` : `<div class="empty"><h4 class="empty-title">No plans yet</h4><p class="empty-copy">This project does not have any tracked plans.</p></div>`}
        </section>
      `;

      const activitySection = `
        <section class="panel">
          <div class="section-header">
            <h3 class="section-title">Recent Activity</h3>
            <div class="meta">Last ${Math.min(activity.length, 20)} entries</div>
          </div>
          ${activity.length ? `<div class="timeline">${activity.map(renderActivityItem).join('')}</div>` : `<div class="empty"><h4 class="empty-title">No recent activity</h4><p class="empty-copy">Task updates and notes will appear here.</p></div>`}
        </section>
      `;

      app.innerHTML = renderShell(header + `<div class="stack">${plansSection}${activitySection}</div>`, `Viewing ${escapeHtml(name)}. Auto-refreshing every 10 seconds.`);
    }

    function renderPlanCard(plan, index) {
      const tasks = Array.isArray(plan.tasks) ? plan.tasks : [];
      const completed = tasks.filter((task) => task.status === 'completed').length;
      const total = tasks.length;
      const pct = total ? Math.round((completed / total) * 100) : 0;
      const planKey = `plan-desc:${plan.id || index}`;
      return `
        <details class="plan-card" ${index === 0 ? 'open' : ''}>
          <summary class="plan-summary">
            <div class="row-between">
              <div>
                <div class="row">
                  <h4 class="plan-title">${escapeHtml(plan.title || 'Untitled plan')}</h4>
                  ${statusBadge(plan.status || 'draft')}
                </div>
                ${plan.description ? `<div style="margin-top: 10px;">${textBlock(planKey, plan.description, 180, 'description')}</div>` : ''}
              </div>
              <div class="plan-summary-indicator">${pct}% complete ▾</div>
            </div>
          </summary>
          <div class="plan-body">
            <div>
              <div class="row-between" style="margin-bottom: 8px;">
                <div class="meta">${completed}/${total} tasks completed</div>
                <div class="meta">${pct}%</div>
              </div>
              <div class="progress"><span style="width:${pct}%;"></span></div>
            </div>
            <div>
              <div class="section-header" style="margin-bottom: 10px;">
                <h5 class="section-title" style="font-size: 1rem; margin: 0;">Tasks</h5>
                <div class="meta">${pluralize(total, 'task')}</div>
              </div>
              ${tasks.length ? `<div class="task-table">${tasks.map(renderTaskRow).join('')}</div>` : '<div class="notes-empty">No tasks for this plan.</div>'}
            </div>
          </div>
        </details>
      `;
    }

    function renderTaskRow(task, index) {
      const noteKey = `task-note:${task.id || index}`;
      const assignee = task.assignee ? escapeHtml(task.assignee) : '<span class="notes-empty">Unassigned</span>';
      const notes = task.notes ? textBlock(noteKey, task.notes, 120, 'task-notes') : '<div class="notes-empty">—</div>';
      return `
        <div class="task-row">
          <div>
            <div class="task-title-line">
              <span class="task-icon">${TASK_ICONS[task.status] || '•'}</span>
              <div>
                <div class="task-title">${escapeHtml(task.title || 'Untitled task')}</div>
                <div class="meta">${statusBadge(task.status || 'pending')}</div>
              </div>
            </div>
          </div>
          <div>
            <div class="meta">Assignee</div>
            <div>${assignee}</div>
          </div>
          <div>
            <div class="meta">Notes</div>
            <div>${notes}</div>
          </div>
          <div>
            <div class="meta">Updated</div>
            <div>${escapeHtml(formatRelative(task.updated_at || task.created_at))}</div>
          </div>
        </div>
      `;
    }

    function renderActivityItem(entry) {
      return `
        <article class="timeline-item">
          <div class="timeline-meta">
            <span>${escapeHtml(formatRelative(entry.created_at))}</span>
            <span class="badge action">${escapeHtml(entry.action || 'activity')}</span>
            ${entry.agent ? `<span>by ${escapeHtml(entry.agent)}</span>` : ''}
          </div>
          <div class="timeline-detail">${escapeHtml(entry.detail || 'No detail provided.')}</div>
        </article>
      `;
    }

    async function requestJson(url) {
      const response = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if (!response.ok) {
        throw new Error(`Request failed with ${response.status}`);
      }
      return response.json();
    }

    async function loadProjects() {
      state.loading = true;
      state.error = '';
      renderLoading('Loading projects…');
      try {
        state.projects = await requestJson('/api/projects');
        state.loading = false;
        renderProjects();
      } catch (error) {
        state.loading = false;
        state.error = error?.message || 'Unable to fetch projects.';
        renderError(state.error);
      }
    }

    async function loadProjectDetail(id) {
      state.loading = true;
      state.error = '';
      renderLoading('Loading project details…');
      try {
        state.detail = await requestJson(`/api/projects/${encodeURIComponent(id)}`);
        state.loading = false;
        renderDetail();
      } catch (error) {
        state.loading = false;
        state.error = error?.message || 'Unable to fetch project detail.';
        renderError(state.error);
      }
    }

    function loadRoute() {
      state.route = parseRoute();
      if (state.route.name === 'project' && state.route.id) {
        loadProjectDetail(state.route.id);
      } else {
        loadProjects();
      }
    }

    function startRefreshLoop() {
      if (refreshHandle) clearInterval(refreshHandle);
      refreshHandle = setInterval(() => {
        loadRoute();
      }, refreshMs);
    }

    document.addEventListener('click', (event) => {
      const actionTarget = event.target.closest('[data-action]');
      if (!actionTarget) return;
      const action = actionTarget.getAttribute('data-action');

      if (action === 'refresh') {
        loadRoute();
        return;
      }

      if (action === 'open-project') {
        navigate(`#/project/${actionTarget.getAttribute('data-project-id')}`);
        return;
      }

      if (action === 'back') {
        navigate('#/');
        return;
      }

      if (action === 'toggle-expand') {
        event.preventDefault();
        event.stopPropagation();
        const key = actionTarget.getAttribute('data-key');
        if (expandedText.has(key)) expandedText.delete(key);
        else expandedText.add(key);
        if (state.route.name === 'project') renderDetail();
        else renderProjects();
      }
    });

    document.addEventListener('keydown', (event) => {
      const projectCard = event.target.closest('[data-action="open-project"]');
      if (!projectCard) return;
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        navigate(`#/project/${projectCard.getAttribute('data-project-id')}`);
      }
    });

    window.addEventListener('hashchange', () => {
      loadRoute();
    });

    startRefreshLoop();
    loadRoute();
  </script>
</body>
</html>
